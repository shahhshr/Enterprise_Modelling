<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Shopping Info</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f3ff;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .container {
            width: 700px;
            margin: auto;
            background: white;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
        }

        h2, h3 {
            color: #6b21a8;
        }

        p {
            font-size: 16px;
            margin: 8px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table, th, td {
            border: 1px solid #ddd;
            padding: 10px;
        }

        th {
            background-color: #ede9fe;
        }

        .empty-msg {
            color: gray;
            margin-top: 20px;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 15px;
            text-decoration: none;
            background-color: #9333ea;
            color: white;
            border-radius: 5px;
        }

        a:hover {
            background-color: #7e22ce;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Shopping Information</h2>

    <p><b>Login ID:</b> <span th:text="${shoppingData.loginId}"></span></p>
    <p><b>Username:</b> <span th:text="${shoppingData.username}"></span></p>
    <p><b>User State:</b> <span th:text="${shoppingData.stateOfUser}"></span></p>

    <h3>Shopping List</h3>

    <div th:if="${#lists.isEmpty(shoppingData.shoppingItems)}">
        <p class="empty-msg">No shopping items found.</p>
    </div>

    <table th:if="${not #lists.isEmpty(shoppingData.shoppingItems)}">
        <thead>
        <tr>
            <th>Shopping ID</th>
            <th>Product Name</th>
            <th>Quantity</th>
            <th>Price</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${shoppingData.shoppingItems}">
            <td th:text="${item.shoppingId}"></td>
            <td th:text="${item.productName}"></td>
            <td th:text="${item.quantity}"></td>
            <td th:text="${item.price}"></td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
