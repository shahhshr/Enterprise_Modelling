<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>All Account Transactions</title>
</head>
<body>

<h2>All Account Transactions</h2>

<a href="/acct-ui/generate">Generate New Transaction</a><br><br>

<table border="1">
    <tr>
        <th>Transaction ID</th>
        <th>Order ID</th>
        <th>Date</th>
        <th>Stock Quote</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Total Amount</th>
        <th>Transaction Type</th>
    </tr>

    <tr th:each="t : ${transactions}">
        <td th:text="${t.transactionId}"></td>
        <td th:text="${t.orderId}"></td>
        <td th:text="${t.date}"></td>
        <td th:text="${t.stockQuote}"></td>
        <td th:text="${t.price}"></td>
        <td th:text="${t.quantity}"></td>
        <td th:text="${t.totalAmount}"></td>
        <td th:text="${t.transactionType}"></td>
    </tr>
</table>

<br>
<a href="/">Back</a>

</body>
</html>
